# NOTES:
## All variable values should be enclosed within double quotes: "<value>"
## CONFIGURATION FILE for `gm2xpkg` script version:
PKGVER="0.9"

# ENV VAR.
## Specific (mandatory to provide!)
TARGET="dosbox_setup.sh"  # [filepath], replace with target's working binary path (<path>/<file_name>)
VERSION="1.0"  # [string], replace with correct release version if exist of target binary

## Generic - common to all apps (better to not modify)
LINK="dosbox_setup.lnk" # [filepath], host path to custom gm2x link, modify if you want to use your pre-edited *.lnk file (warning: it may be removed with CLEAN=1)

## Custom entries (if needed then modify)
TARGET_DIR="dosboxbat" # [dirpath], target device install directory $HOMEPATH/$DESTDIR/$TARGET_DIR of executable binary (default TARGET_DIR=$(basename $TARGET))

## IPK control entries (if needed then modify)
PKG="" # default=$TARGET - name of the opkg package
MAINTAINER="Apaczer"
ARCH="all" # default=arm - do not modify for ARM chips
SOURCE="https://github.com/Apaczer/miyoo_tools/tree/main/dos"
LICENSE="GPL-2.0"
